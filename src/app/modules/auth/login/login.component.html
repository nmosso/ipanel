<div class="hold-transition login-page">
<div class="login-box">
  <div class="login-logo">
    <a href="javascript:void(0)"><b>Admin</b> Xi</a>
  </div>
  <!-- /.login-logo -->
  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg">Sign In here</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSingIn()">
        <div class="input-group mb-3">
          <input type="email" formControlName="email" class="form-control" placeholder="Email">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-envelope"></span>
            </div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" formControlName="password" class="form-control" placeholder="Password">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
      <div class="form-group">
        <!-- "6Lci-VsqAAAAAI7RGCIXOlvBii7TrTWYh9dPSRjO"  "6LfzE-MqAAAAAOATbFgG7_y04Tl8ijktToU2w7DP"  -->
        <re-captcha
          formControlName="recaptcha"
          siteKey="6Lci-VsqAAAAAI7RGCIXOlvBii7TrTWYh9dPSRjO" 
          (resolved)="resolvedCaptcha($event)">
        </re-captcha>
      </div>        
        <div class="row">
          <div class="col-8">
            <div class="icheck-primary">
              <input type="checkbox" id="remember">
              <label for="remember">
                Recordarme en este equipo
              </label>
            </div>
          </div>
          <!-- /.col -->
          <div class="col-4">
            <button type="submit" class="btn btn-primary btn-block" [disabled]="!loginForm.valid">Login</button>
          </div>
          <!-- /.col -->
        </div>
      </form>
<!--
      </re-captcha>"6LfC4C0qAAAAAETi0ygID55guS7VZ_tBIuWZTZ46" >
      <div class="social-auth-links text-center mb-3">
        <p>- OR -</p>
        <a href="#" class="btn btn-block btn-primary">
          <i class="fab fa-facebook mr-2"></i> Sign in using Facebook
        </a>
        <a href="#" class="btn btn-block btn-danger">
          <i class="fab fa-google-plus mr-2"></i> Sign in using Google+
        </a>
      </div>
      <!-- /.social-auth-links -->

      <p class="mb-1">
        <a href="/reset-password" (click)="moveToForgetPassword()">Reset Password</a>
      </p>
      <p class="mb-0">
        <a href="javascript:void(0)" class="text-center">Register</a>
      </p>
    </div>
    <!-- /.login-card-body -->
  </div>
</div>
</div>
